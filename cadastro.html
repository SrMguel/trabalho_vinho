<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Reserva Especial</title>

    <!-- conecta com o CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- caixa do cadastro -->
    <div class="cadastro">
      <h1>Cadastro</h1>

      <p>Crie sua garrafa personalizada</p>

      <!-- formulário -->
      <form>
        <!-- nome -->
        <label>Nome completo</label>
        <input type="text" placeholder="Digite seu nome completo" />

        <!-- email -->
        <label>email</label>
        <input type="email" placeholder="Digite seu email" />

        <!-- data -->
        <label>Data de nascimento</label>
        <input type="date" />

        <!-- senha -->
        <label>Senha</label>
        <input type="password" placeholder="Crie sua senha" />

        <!-- confirmar senha -->
        <label>Confirmar senha</label>
        <input type="password" placeholder="Confirme sua senha" />

        <!-- checkbox -->
        <div class="termos">
          <input type="checkbox" />

          <span> Aceito os Termos de Uso e Política de Privacidade </span>
        </div>

        <!-- botão -->
        <button type="submit">Finalizar Reserva</button>

        <!-- divisor -->
        <div class="linha">
          <span>ou</span>
        </div>

        <!-- google -->
        <button class="google">
          <img src="/googleicon.png" alt="google">
          <a href="https://www.google.com/">Entrar com Google</a>
        </button>
      </form>
    </div>
  </body>
</html>
